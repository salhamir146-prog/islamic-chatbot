<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آوای یقین - دستیار دینی</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  .chat-widget {
    width: 100%;
    max-width: 480px;
    background: #161b22;
    border-radius: 20px;
    border: 1px solid #2d9c6e33;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 620px;
    box-shadow: 0 0 60px #2d9c6e22, 0 20px 60px #00000088;
  }
  .chat-header {
    background: linear-gradient(135deg, #1a3a2a 0%, #0f2419 100%);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid #2d9c6e44;
    flex-shrink: 0;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #2d9c6e, #1a6b47);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 0 16px #2d9c6e55;
  }
  .header-text h2 { color: #e8f5e9; font-size: 15px; font-weight: 700; }
  .header-text p { color: #2d9c6e; font-size: 11px; margin-top: 2px; }
  .status-dot {
    width: 7px; height: 7px;
    background: #4caf50;
    border-radius: 50%;
    margin-right: auto;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: #2d9c6e33 transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #2d9c6e44; border-radius: 4px; }
  .welcome-msg {
    background: linear-gradient(135deg, #1a3a2a, #162d21);
    border: 1px solid #2d9c6e33;
    border-radius: 16px 16px 16px 4px;
    padding: 16px;
    color: #a8d5b8;
    font-size: 13.5px;
    line-height: 1.9;
  }
  .welcome-msg .bismillah {
    color: #2d9c6e;
    font-size: 18px;
    font-weight: 700;
    display: block;
    margin-bottom: 10px;
    text-align: center;
  }
  .msg { display: flex; flex-direction: column; max-width: 88%; }
  .msg.user { align-self: flex-start; }
  .msg.bot { align-self: flex-end; }
  .msg-bubble { padding: 12px 15px; border-radius: 16px; font-size: 13.5px; line-height: 1.85; }
  .msg.user .msg-bubble {
    background: #1e2a22;
    border: 1px solid #2d9c6e44;
    border-radius: 16px 16px 16px 4px;
    color: #c8e6c9;
  }
  .msg.bot .msg-bubble {
    background: linear-gradient(135deg, #1b3a2d, #142b20);
    border: 1px solid #2d9c6e66;
    border-radius: 16px 16px 4px 16px;
    color: #e8f5e9;
  }
  .msg-time { font-size: 10px; color: #4a6b52; margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }
  .msg.bot .msg-time { text-align: left; }
  .typing-indicator {
    align-self: flex-end;
    background: #1b3a2d;
    border: 1px solid #2d9c6e44;
    border-radius: 16px 16px 4px 16px;
    padding: 12px 18px;
    display: none;
  }
  .typing-indicator.active { display: flex; gap: 5px; align-items: center; }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: #2d9c6e;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 7px;
    padding: 0 16px 10px; flex-shrink: 0;
  }
  .chip {
    background: #1a2e22;
    border: 1px solid #2d9c6e44;
    border-radius: 20px;
    padding: 6px 12px;
    color: #5aaa78;
    font-size: 11.5px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Vazirmatn', sans-serif;
  }
  .chip:hover { background: #2d9c6e22; border-color: #2d9c6e88; color: #7ec89a; }
  .error-msg {
    background: #2a1a1a;
    border: 1px solid #8b4a4a;
    border-radius: 12px;
    padding: 10px 14px;
    color: #e88;
    font-size: 12px;
    text-align: center;
    margin: 0 16px;
    display: none;
  }
  .error-msg.show { display: block; }
  .chat-input-area {
    padding: 14px 16px;
    background: #161b22;
    border-top: 1px solid #2d9c6e22;
    display: flex; gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: #1e2a22;
    border: 1px solid #2d9c6e44;
    border-radius: 14px;
    padding: 11px 14px;
    color: #c8e6c9;
    font-size: 13.5px;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    outline: none; resize: none;
    min-height: 44px; max-height: 110px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: #2d9c6e; }
  .chat-input::placeholder { color: #3d6b4a; }
  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #2d9c6e, #1a6b47);
    border: none; border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; flex-shrink: 0;
    box-shadow: 0 4px 14px #2d9c6e44;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 20px; height: 20px; fill: white; }
</style>
</head>
<body>

<div class="chat-widget">
  <div class="chat-header">
    <div class="header-icon">☪</div>
    <div class="header-text">
      <h2>آوای یقین</h2>
      <p>دستیار پاسخ‌گوی دینی — فقه شیعه اثنی‌عشری</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="welcome-msg">
      <span class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>
      سلام، خوش آمدید.<br>
      سوالات دینی خود را بپرسید. پاسخ‌ها بر اساس <strong>فقه شیعه اثنی‌عشری</strong> ارائه می‌شود.
    </div>
    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="suggestions" id="suggestions">
    <span class="chip" onclick="askSuggestion(this)">حکم نماز قضا</span>
    <span class="chip" onclick="askSuggestion(this)">خمس چیست؟</span>
    <span class="chip" onclick="askSuggestion(this)">احکام روزه</span>
    <span class="chip" onclick="askSuggestion(this)">وضو چگونه است؟</span>
  </div>

  <div class="chat-input-area">
    <textarea
      class="chat-input"
      id="userInput"
      placeholder="سوال دینی خود را بنویسید..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://avaye-yaghin.onrender.com';

  let isLoading = false;
  let history = [];

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    document.getElementById('suggestions').style.display = 'none';
    addMessage(text, 'user');
    input.value = '';
    autoResize(input);
    setLoading(true);
    showError('');

    try {
      const res = await fetch(`${SERVER_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      history = data.history;
      addMessage(data.reply, 'bot');

    } catch (err) {
      showError('خطا در دریافت پاسخ. لطفاً دوباره تلاش کنید.');
    } finally {
      setLoading(false);
    }
  }

  function addMessage(text, role) {
    const container = document.getElementById('messages');
    const typing = document.getElementById('typing');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const now = new Date();
    const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    div.innerHTML = `
      <div class="msg-bubble">${formatText(text)}</div>
      <div class="msg-time">${time}</div>
    `;
    container.insertBefore(div, typing);
    container.scrollTop = container.scrollHeight;
  }

  function formatText(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\n/g,'<br>');
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('typing').className = 'typing-indicator' + (val ? ' active' : '');
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('messages').scrollTop = 999999;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.className = 'error-msg' + (msg ? ' show' : '');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  function askSuggestion(chip) {
    document.getElementById('userInput').value = chip.textContent;
    sendMessage();
  }
</script>

</body>
</html>
